<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safari Book 6 Portal</title>
  <style>
    body {
      min-height: 100vh;
      background: #F7F3EE;
      font-family: Georgia, 'Times New Roman', serif;
      color: #1A1A1A;
      margin: 0;
      padding: 0;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #1A3A5C 0%, #2E6B5A 100%);
      color: white;
      padding: 24px 20px 20px;
      text-align: center;
    }
    .header-eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 6px;
    }
    .header-title { font-size: 26px; font-weight: bold; margin-bottom: 4px; }
    .header-sub { font-size: 13px; opacity: 0.8; }

    /* ── CONTAINER ── */
    .container { max-width: 680px; margin: 0 auto; padding: 24px 16px; }

    /* ── SETUP ── */
    .section-label {
      font-size: 11px;
      font-weight: bold;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .topic-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .topic-btn {
      padding: 7px 13px;
      border-radius: 20px;
      border: 2px solid var(--col);
      background: transparent;
      color: var(--col);
      font-size: 12px;
      font-family: Georgia, serif;
      cursor: pointer;
      font-weight: normal;
      transition: all 0.15s;
    }
    .topic-btn.active {
      background: var(--col);
      color: white;
      font-weight: bold;
    }
    .link-row { display: flex; gap: 10px; margin-bottom: 28px; align-items: center; }
    .link-btn {
      font-size: 12px;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      font-family: Georgia, serif;
    }
    .link-sep { color: #ccc; }

    .count-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .count-btn {
      width: 52px; height: 52px;
      border-radius: 10px;
      border: 2px solid #DDD;
      background: white;
      color: #444;
      font-size: 15px;
      font-family: Georgia, serif;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: normal;
    }
    .count-btn.active {
      border-color: #1A3A5C;
      background: #1A3A5C;
      color: white;
      font-weight: bold;
    }
    .count-btn:disabled { opacity: 0.4; cursor: default; }

    .count-hint { color: #888; font-size: 12px; margin-bottom: 28px; }

    /* ── PRIMARY BUTTON ── */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #1A3A5C, #2E6B5A);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-family: Georgia, serif;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .btn-primary:disabled { background: #CCC; cursor: default; }

    /* ── QUIZ ── */
    .progress-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .progress-track {
      height: 5px;
      background: #DDD;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #1A3A5C, #2E6B5A);
      border-radius: 3px;
      transition: width 0.4s;
    }

    .topic-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .question-text {
      font-size: 17px;
      color: #1A1A1A;
      margin-bottom: 22px;
      line-height: 1.55;
      font-weight: 500;
    }

    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .option-btn {
      width: 100%;
      padding: 13px 16px;
      background: white;
      border: 2px solid #DDD;
      border-radius: 8px;
      color: #222;
      font-size: 14px;
      font-family: Georgia, serif;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      box-sizing: border-box;
    }
    .option-btn.selected { background: #EEF3FA; border-color: #1A3A5C; color: #1A3A5C; }
    .option-btn.correct  { background: #E6F4ED; border-color: #2E6B5A; color: #1A5C3A; }
    .option-btn.wrong    { background: #FAE6E6; border-color: #C0392B; color: #C0392B; }
    .option-btn.revealed { cursor: default; }

    .option-letter {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #EEE;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .option-btn.selected .option-letter { background: #1A3A5C; color: white; }
    .option-btn.correct  .option-letter { background: #2E6B5A; color: white; }
    .option-btn.wrong    .option-letter { background: #C0392B; color: white; }

    .explanation {
      padding: 14px 16px;
      background: #F0F7F4;
      border-left: 4px solid #2E6B5A;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      color: #2C4A3A;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .btn-check {
      width: 100%; padding: 14px;
      border-radius: 8px; border: none;
      background: #1A3A5C;
      color: white; font-size: 15px;
      font-family: Georgia, serif; font-weight: bold;
      cursor: pointer;
    }
    .btn-check:disabled { background: #CCC; cursor: default; }
    .btn-next {
      width: 100%; padding: 14px;
      border-radius: 8px; border: none;
      background: linear-gradient(135deg, #1A3A5C, #2E6B5A);
      color: white; font-size: 15px;
      font-family: Georgia, serif; font-weight: bold;
      cursor: pointer;
    }

    /* ── RESULTS ── */
    .results-centre { text-align: center; margin-bottom: 28px; }
    .score-ring {
      width: 120px; height: 120px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 0 0 8px white, 0 0 0 10px #2E6B5A33;
    }
    .score-inner {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: white;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .score-pct { font-size: 28px; font-weight: bold; color: #1A3A5C; }
    .score-frac { font-size: 11px; color: #888; }
    .score-grade { font-size: 18px; font-weight: bold; color: #1A3A5C; }

    .breakdown-card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .breakdown-row { margin-bottom: 10px; }
    .breakdown-header {
      display: flex; justify-content: space-between;
      font-size: 12px; margin-bottom: 3px;
    }
    .breakdown-track {
      height: 5px; background: #EEE; border-radius: 3px;
    }
    .breakdown-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.5s;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #AAA;
      padding: 16px;
      margin-top: 8px;
    }

    /* ── HIDDEN ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-eyebrow">Safari Academy</div>
    <div class="header-title">Islamic Studies Book 6</div>
    <div class="header-sub">Master Question Assessment Bank</div>
  </div>

  <div class="container">
    
    <div id="view-setup">
      <div class="section-label">Topics</div>
      <div class="topic-grid" id="topic-grid"></div>
      <div class="link-row">
        <button class="link-btn" style="color:#2E6B5A" onclick="selectAllTopics()">Select all</button>
        <span class="link-sep">|</span>
        <button class="link-btn" style="color:#888" onclick="clearTopics()">Clear all</button>
      </div>

      <div class="section-label">Number of Questions</div>
      <div class="count-grid" id="count-grid"></div>
      <div class="count-hint" id="count-hint">Select a topic to calculate total available questions.</div>

      <button class="btn-primary" id="btn-start" disabled onclick="startQuiz()">Start Test →</button>
    </div>

    <div id="view-quiz" class="hidden">
      <div class="progress-row">
        <span id="quiz-progress-text">Question 1 of 50</span>
        <span id="quiz-score-live">Score: 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="quiz-progress-fill" style="width: 0%;"></div>
      </div>

      <div class="topic-badge" id="quiz-topic-badge">Topic</div>
      <div class="question-text" id="quiz-question-text">Question text template?</div>

      <div class="options" id="quiz-options-container"></div>

      <div class="explanation hidden" id="quiz-explanation"></div>

      <button class="btn-check" id="btn-action" disabled onclick="handleQuizAction()">Check Answer</button>
    </div>

    <div id="view-results" class="hidden">
      <div class="results-centre">
        <div class="score-ring">
          <div class="score-inner">
            <div class="score-pct" id="res-pct">0%</div>
            <div class="score-frac" id="res-frac">0/0</div>
          </div>
        </div>
        <div class="score-grade" id="res-grade">Result Status</div>
      </div>

      <div class="section-label">Topic Breakdown</div>
      <div class="breakdown-card" id="res-breakdown"></div>

      <button class="btn-primary" onclick="restartApp()">Try Another Test</button>
    </div>

    <div class="footer">
      Powered by Safari Book 6 Educational Framework
    </div>
  </div>

  <script>
    // ── SAFARI BOOK 6 TOPICS ──
    const quizTopics = [
      { id: 'aqidah', name: 'Aqidah (Belief System)', color: '#1A3A5C' },
      { id: 'fiqh', name: 'Fiqh (Islamic Jurisprudence)', color: '#2E6B5A' },
      { id: 'seerah', name: 'Seerah & History', color: '#C0392B' },
      { id: 'adab', name: 'Adab & Akhlaq (Manners)', color: '#8E44AD' }
    ];

    // ── 50 QUESTIONS DIRECTLY FOR SAFARI BOOK 6 ──
    const quizQuestions = [
      // --- AQIDAH (1-13) ---
      {
        id: 1, topic: 'aqidah',
        question: 'What is the theological meaning of Tanzih in Islamic Creed?',
        options: [
          { letter: 'A', text: 'Comparing Allah to His creations' },
          { letter: 'B', text: 'Purifying and declaring Allah free from any flaws, limitations, or human attributes' },
          { letter: 'C', text: 'Believing that Allah only exists in nature' },
          { letter: 'D', text: 'Denying the existence of angels' }
        ],
        correct: 'B', explanation: 'Tanzih means declaring Allah free from imperfection and ensuring we do not compare Him to created things.'
      },
      {
        id: 2, topic: 'aqidah',
        question: 'Which statement accurately describes Allah\'s attribute of Al-Qadim?',
        options: [
          { letter: 'A', text: 'He is subject to time changes' },
          { letter: 'B', text: 'He is The Eternal, who existed before anything else without a beginning' },
          { letter: 'C', text: 'He was created after the universe' },
          { letter: 'D', text: 'His existence has an end point' }
        ],
        correct: 'B', explanation: 'Al-Qadim signifies that Allah is timeless and His existence has absolutely no beginning.'
      },
      {
        id: 3, topic: 'aqidah',
        question: 'What is the definition of Shirk al-Asghar?',
        options: [
          { letter: 'A', text: 'Worshipping completely different idols outright' },
          { letter: 'B', text: 'Minor shirk, such as performing acts of worship to show off to people (Riyaa)' },
          { letter: 'C', text: 'Believing in two equal gods' },
          { letter: 'D', text: 'Disbelieving in the day of judgment entirely' }
        ],
        correct: 'B', explanation: 'Shirk al-Asghar includes minor hidden forms of association, such as displaying good deeds for praise (Riyaa).'
      },
      {
        id: 4, topic: 'aqidah',
        question: 'Belief in the Divine Decree (Al-Qadr) implies which of the following actions?',
        options: [
          { letter: 'A', text: 'Giving up all efforts since everything is written' },
          { letter: 'B', text: 'Believing Allah knows, creates, and decrees everything, while taking active responsibility for choices' },
          { letter: 'C', text: 'Believing humans have zero willpower' },
          { letter: 'D', text: 'Believing that everything happens completely by random luck' }
        ],
        correct: 'B', explanation: 'Al-Qadr requires recognizing Allah\'s total sovereignty while putting forth personal effort.'
      },
      {
        id: 5, topic: 'aqidah',
        question: 'What does the attribute Al-Baqi mean regarding Allah?',
        options: [
          { letter: 'A', text: 'The All-Powerful' },
          { letter: 'B', text: 'The Everlasting, who remains forever after creation perishes' },
          { letter: 'C', text: 'The Most Merciful' },
          { letter: 'D', text: 'The Provider of food' }
        ],
        correct: 'B', explanation: 'Al-Baqi guarantees that Allah is everlasting and survives everything else in existence.'
      },
      {
        id: 6, topic: 'aqidah',
        question: 'Which of the following is considered part of the Unseen (Ghayb)?',
        options: [
          { letter: 'A', text: 'The physical trees and oceans' },
          { letter: 'B', text: 'The questions of the grave by Munkar and Nakir' },
          { letter: 'C', text: 'Scientific facts observed under microscopes' },
          { letter: 'D', text: 'Historical buildings built by humans' }
        ],
        correct: 'B', explanation: 'Life in the grave and the actions of angels belong completely to the realm of the Unseen (Ghayb).'
      },
      {
        id: 7, topic: 'aqidah',
        question: 'What is the role of the Scale (Al-Mizan) on the Day of Resurrection?',
        options: [
          { letter: 'A', text: 'To weigh the physical mass of human bodies' },
          { letter: 'B', text: 'To weigh human deeds, tracking whether good or bad outbalances the other' },
          { letter: 'C', text: 'To count the number of days spent on Earth' },
          { letter: 'D', text: 'To distribute wealth to people' }
        ],
        correct: 'B', explanation: 'Al-Mizan is the literal scale designed to weigh the moral balance of human actions.'
      },
      {
        id: 8, topic: 'aqidah',
        question: 'What is the description of Al-Hawd in Islamic eschatology?',
        options: [
          { letter: 'A', text: 'The path over hellfire' },
          { letter: 'B', text: 'The prophetic pool where true believers will drink on the Day of Judgment' },
          { letter: 'C', text: 'The gate of paradise' },
          { letter: 'D', text: 'The throne of the angels' }
        ],
        correct: 'B', explanation: 'Al-Hawd is the special reservoir granted to the Prophet ﷺ from which believers will drink.'
      },
      {
        id: 9, topic: 'aqidah',
        question: 'Why are prophets protected from falling into major sins (Ismah)?',
        options: [
          { letter: 'A', text: 'Because they are not human beings' },
          { letter: 'B', text: 'To preserve the perfection and reliability of the divine message they deliver' },
          { letter: 'C', text: 'Because they cannot move physically' },
          { letter: 'D', text: 'To allow them to rule empires without laws' }
        ],
        correct: 'B', explanation: 'Ismah (infallibility) ensures that the examples and teachings of the prophets remain pure and trustworthy.'
      },
      {
        id: 10, topic: 'aqidah',
        question: 'What distinguishes a Mu\'jizah (Miracle) from regular occurrences?',
        options: [
          { letter: 'A', text: 'It can be learned by anyone practicing magic tricks' },
          { letter: 'B', text: 'It is a supernatural event granted by Allah to a prophet to verify their claim' },
          { letter: 'C', text: 'It happens every single day to all people' },
          { letter: 'D', text: 'It is done for amusement or financial profit' }
        ],
        correct: 'B', explanation: 'A Mu\'jizah is a direct sign from Allah that breaks natural laws to support a true prophet.'
      },
      {
        id: 11, topic: 'aqidah',
        question: 'What is the theological danger of claiming knowledge of the exact time of the Hour (Qiyamah)?',
        options: [
          { letter: 'A', text: 'It conflicts with the Quranic truth that only Allah holds this knowledge' },
          { letter: 'B', text: 'It is allowed if calculated with math models' },
          { letter: 'C', text: 'It is a required act of worship' },
          { letter: 'D', text: 'It increases worldly wealth' }
        ],
        correct: 'A', explanation: 'The timing of the Hour is exclusive to Allah\'s knowledge, as confirmed in Surah Luqman.'
      },
      {
        id: 12, topic: 'aqidah',
        question: 'What does the belief in the scriptures (Kutub) include for a Muslim?',
        options: [
          { letter: 'A', text: 'Believing only the text of the modern Quran ever existed' },
          { letter: 'B', text: 'Believing that Allah revealed books to past prophets in their original pure forms' },
          { letter: 'C', text: 'Following the laws of older scriptures today' },
          { letter: 'D', text: 'Denying all scriptures except oral stories' }
        ],
        correct: 'B', explanation: 'Muslims must believe that original books (Torah, Gospel, Psalms) were authentically revealed by Allah.'
      },
      {
        id: 13, topic: 'aqidah',
        question: 'Which of the following describes the attribute of Al-Khaliq?',
        options: [
          { letter: 'A', text: 'The Sustainer' },
          { letter: 'B', text: 'The Creator, who brings things from non-existence into existence' },
          { letter: 'C', text: 'The Wise Judge' },
          { letter: 'D', text: 'The Forgiver' }
        ],
        correct: 'B', explanation: 'Al-Khaliq means The Creator, who originates everything without any pre-existing blueprint.'
      },

      // --- FIQH (14-25) ---
      {
        id: 14, topic: 'fiqh',
        question: 'What is the operational distance threshold required to qualify a journey for travel concessions (Qasr)?',
        options: [
          { letter: 'A', text: 'Around 5 miles' },
          { letter: 'B', text: 'Approximately 48 miles (approx. 77-80 km) away from one\'s city boundary' },
          { letter: 'C', text: 'Exactly 500 meters' },
          { letter: 'D', text: 'Any distance that takes more than 10 hours' }
        ],
        correct: 'B', explanation: 'Classic Fiqh calculations approximate the travel concession (Safar) threshold around 48 miles.'
      },
      {
        id: 15, topic: 'fiqh',
        question: 'Which prayers are allowed to be shortened during travel (Qasr)?',
        options: [
          { letter: 'A', text: 'Fajr, Maghrib, and Isha' },
          { letter: 'B', text: 'Dhuhr, Asr, and Isha' },
          { letter: 'C', text: 'Only Asr' },
          { letter: 'D', text: 'All five prayers including Fajr' }
        ],
        correct: 'B', explanation: 'Only the 4-rak\'ah prayers (Dhuhr, Asr, and Isha) are shortened to 2 rak\'ahs.'
      },
      {
        id: 16, topic: 'fiqh',
        question: 'What is the core ruling on Jam\' al-Taqdim?',
        options: [
          { letter: 'A', text: 'Delaying a prayer to a later time slot' },
          { letter: 'B', text: 'Bringing the second prayer forward into the time slot of the first prayer due to travel' },
          { letter: 'C', text: 'Skipping prayers until the journey is complete' },
          { letter: 'D', text: 'Combining Fajr with Dhuhr' }
        ],
        correct: 'B', explanation: 'Jam\' al-Taqdim means advancing the later prayer into the earlier prayer\'s timeframe.'
      },
      {
        id: 17, topic: 'fiqh',
        question: 'What is the primary condition required for Tayammum (Dry Ablution) to become permissible?',
        options: [
          { letter: 'A', text: 'Losing one\'s prayer cap' },
          { letter: 'B', text: 'The complete absence of clean water or an inability to use it due to illness' },
          { letter: 'C', text: 'Feeling slightly cold' },
          { letter: 'D', text: 'Being inside a mosque' }
        ],
        correct: 'B', explanation: 'Tayammum is granted as a concession when clean water is unavailable or dangerous to health.'
      },
      {
        id: 18, topic: 'fiqh',
        question: 'What acts nullify the fast (Sawm) according to Fiqh principles?',
        options: [
          { letter: 'A', text: 'Brushing teeth carefully without swallowing water' },
          { letter: 'B', text: 'Deliberate eating, drinking, or intentional vomiting' },
          { letter: 'C', text: 'Accidentally swallowing food due to forgetfulness' },
          { letter: 'D', text: 'Applying perfume' }
        ],
        correct: 'B', explanation: 'Intentional ingestion of food or liquid, or self-induced vomiting, breaks the fast.'
      },
      {
        id: 19, topic: 'fiqh',
        question: 'What is the specific definition of Nisab in Zakat calculation?',
        options: [
          { letter: 'A', text: 'The maximum amount of money a person can spend' },
          { letter: 'B', text: 'The minimum threshold of wealth a person must own for one lunar year to owe Zakat' },
          { letter: 'C', text: 'The tax paid on agricultural land' },
          { letter: 'D', text: 'The value of a family house' }
        ],
        correct: 'B', explanation: 'Nisab is the minimum baseline value of savings that triggers the obligation of Zakat.'
      },
      {
        id: 20, topic: 'fiqh',
        question: 'What percentage of eligible accumulated wealth must be paid as Zakat annually?',
        options: [
          { letter: 'A', text: '10%' },
          { letter: 'B', text: '2.5%' },
          { letter: 'C', text: '50%' },
          { letter: 'D', text: '1.5%' }
        ],
        correct: 'B', explanation: 'The established rate of Zakat on monetary savings and gold/silver asset values is 2.5%.'
      },
      {
        id: 21, topic: 'fiqh',
        question: 'What does the term Fard Kifayah mean in community jurisprudence?',
        options: [
          { letter: 'A', text: 'An individual obligation on every single adult' },
          { letter: 'B', text: 'A communal obligation; if a few fulfill it, the sin is lifted from the community' },
          { letter: 'C', text: 'An optional act that carries no reward' },
          { letter: 'D', text: 'A forbidden practice' }
        ],
        correct: 'B', explanation: 'Fard Kifayah refers to actions like the funeral prayer, which suffice if completed by a group.'
      },
      {
        id: 22, topic: 'fiqh',
        question: 'Which of the following represents a structural pillar (Rukn) of Salah?',
        options: [
          { letter: 'A', text: 'Wearing new clothes' },
          { letter: 'B', text: 'Reciting an extra surah after Surah al-Fatiha' },
          { letter: 'C', text: 'The Ruku (Bowing down) and Sujud (Prostration)' },
          { letter: 'D', text: 'Saying the Du\'a al-Qunut' }
        ],
        correct: 'C', explanation: 'Ruku and Sujud are fundamental physical pillars (Arkan). Without them, Salah is invalid.'
      },
      {
        id: 23, topic: 'fiqh',
        question: 'What is the ruling on standard transactions involving Riba (Usury/Interest)?',
        options: [
          { letter: 'A', text: 'Highly encouraged in trade' },
          { letter: 'B', text: 'Strictly prohibited (Haram) due to exploitation and injustice' },
          { letter: 'C', text: 'Makruh (disliked) but allowed' },
          { letter: 'D', text: 'Fard on businessmen' }
        ],
        correct: 'B', explanation: 'Riba is strictly forbidden in Shariah because it creates economic harm and exploitation.'
      },
      {
        id: 24, topic: 'fiqh',
        question: 'What constitutes the state of Ihram during Hajj?',
        options: [
          { letter: 'A', text: 'Buying gifts in Makkah' },

    // ── APPLICATION ENGINE STATE ──
    let selectedTopics = [];
    let targetQuestionCount = 0;
    let activeQuizPool = [];
    let currentIdx = 0;
    let correctAnswersCount = 0;
    let selectedOptionLetter = null;
    let isAnswerChecked = false;
    let topicTrackingData = {};

    // ── INITIALIZATION ──
    function init() {
      renderTopics();
      updateTargetCountsGrid();
    }

    function renderTopics() {
      const grid = document.getElementById('topic-grid');
      grid.innerHTML = quizTopics.map(t => `
        <button class="topic-btn" id="tbtn-${t.id}" style="--col: ${t.color}" onclick="toggleTopic('${t.id}')">
          ${t.name}
        </button>
      `).join('');
    }

    function toggleTopic(id) {
      if (selectedTopics.includes(id)) {
        selectedTopics = selectedTopics.filter(t => t !== id);
        document.getElementById(`tbtn-${id}`).classList.remove('active');
      } else {
        selectedTopics.push(id);
        document.getElementById(`tbtn-${id}`).classList.add('active');
      }
      updateTargetCountsGrid();
    }

    function selectAllTopics() {
      selectedTopics = quizTopics.map(t => t.id);
      quizTopics.forEach(t => document.getElementById(`tbtn-${t.id}`).classList.add('active'));
      updateTargetCountsGrid();
    }

    function clearTopics() {
      selectedTopics = [];
      quizTopics.forEach(t => document.getElementById(`tbtn-${t.id}`).classList.remove('active'));
      updateTargetCountsGrid();
    }

    function updateTargetCountsGrid() {
      const pool = quizQuestions.filter(q => selectedTopics.includes(q.topic));
      const totalAvailable = pool.length;
      
      const hint = document.getElementById('count-hint');
      hint.innerText = `${totalAvailable} questions found within matching configurations.`;

      const grid = document.getElementById('count-grid');
      grid.innerHTML = '';

      if (totalAvailable === 0) {
        document.getElementById('btn-start').disabled = true;
        return;
      }

      // Dynamic button thresholds matching layout constraints
      const intervals = [5, 10, 20, 30, 50].filter(num => num <= totalAvailable);
      if (!intervals.includes(totalAvailable) && totalAvailable > 0) {
        intervals.push(totalAvailable);
      }

      intervals.forEach(num => {
        const btn = document.createElement('button');
        btn.className = 'count-btn';
        if (targetQuestionCount === num) btn.className += ' active';
        btn.innerText = num;
        btn.onclick = () => {
          targetQuestionCount = num;
          updateTargetCountsGrid();
        };
        grid.appendChild(btn);
      });

      if (!intervals.includes(targetQuestionCount)) {
        targetQuestionCount = intervals[0] || 0;
      }

      document.getElementById('btn-start').disabled = targetQuestionCount === 0;
    }

    // ── CORE GAME LOOP CONTROLLERS ──
    function startQuiz() {
      const pool = quizQuestions.filter(q => selectedTopics.includes(q.topic));
      activeQuizPool = pool.sort(() => 0.5 - Math.random()).slice(0, targetQuestionCount);
      
      currentIdx = 0;
      correctAnswersCount = 0;
      topicTrackingData = {};
      
      selectedTopics.forEach(id => {
        topicTrackingData[id] = { total: 0, correct: 0 };
      });

      document.getElementById('view-setup').classList.add('hidden');
      document.getElementById('view-quiz').classList.remove('hidden');
      
      displayQuestion();
    }

    function displayQuestion() {
      isAnswerChecked = false;
      selectedOptionLetter = null;

      const q = activeQuizPool[currentIdx];
      
      if (topicTrackingData[q.topic]) {
        topicTrackingData[q.topic].total += 1;
      }

      document.getElementById('quiz-progress-text').innerText = `Question ${currentIdx + 1} of ${targetQuestionCount}`;
      document.getElementById('quiz-score-live').innerText = `Score: ${correctAnswersCount}`;
      
      const fillPercentage = (currentIdx / targetQuestionCount) * 100;
      document.getElementById('quiz-progress-fill').style.width = `${fillPercentage}%`;

      const topicMeta = quizTopics.find(t => t.id === q.topic);
      const badge = document.getElementById('quiz-topic-badge');
      badge.innerText = topicMeta ? topicMeta.name : q.topic;
      badge.style.background = topicMeta ? topicMeta.color : '#1A3A5C';
      badge.style.color = 'white';

      document.getElementById('quiz-question-text').innerText = q.question;
      
      document.getElementById('quiz-explanation').classList.add('hidden');
      const actionBtn = document.getElementById('btn-action');
      actionBtn.className = 'btn-check';
      actionBtn.innerText = 'Check Answer';
      actionBtn.disabled = true;

      const optContainer = document.getElementById('quiz-options-container');
      optContainer.innerHTML = q.options.map(o => `
        <button class="option-btn" id="opt-${o.letter}" onclick="selectOption('${o.letter}')">
          <div class="option-letter">${o.letter}</div>
          <div>${o.text}</div>
        </button>
      `).join('');
    }

    function selectOption(letter) {
      if (isAnswerChecked) return;
      
      selectedOptionLetter = letter;
      document.getElementById('btn-action').disabled = false;

      const options = document.querySelectorAll('.option-btn');
      options.forEach(opt => opt.classList.remove('selected'));
      
      document.getElementById(`opt-${letter}`).classList.add('selected');
    }

    function handleQuizAction() {
      if (!isAnswerChecked) {
        evaluateSubmittedSelection();
      } else {
        advanceWorkflowIndex();
      }
    }

    function evaluateSubmittedSelection() {
      isAnswerChecked = true;
      const q = activeQuizPool[currentIdx];
      
      const selectedBtn = document.getElementById(`opt-${selectedOptionLetter}`);
      const correctBtn = document.getElementById(`opt-${q.correct}`);

      selectedBtn.classList.remove('selected');
      
      if (selectedOptionLetter === q.correct) {
        selectedBtn.classList.add('correct');
        correctAnswersCount += 1;
        if (topicTrackingData[q.topic]) topicTrackingData[q.topic].correct += 1;
      } else {
        selectedBtn.classList.add('wrong');
        if (correctBtn) correctBtn.classList.add('correct');
      }

      const allOptions = document.querySelectorAll('.option-btn');
      allOptions.forEach(opt => opt.classList.add('revealed'));

      const expBox = document.getElementById('quiz-explanation');
      expBox.innerText = q.explanation;
      expBox.classList.remove('hidden');

      const actionBtn = document.getElementById('btn-action');
      actionBtn.className = 'btn-next';
      actionBtn.innerText = (currentIdx === targetQuestionCount - 1) ? 'Finish Quiz' : 'Next Question';
      
      document.getElementById('quiz-score-live').innerText = `Score: ${correctAnswersCount}`;
    }

    function advanceWorkflowIndex() {
      if (currentIdx < targetQuestionCount - 1) {
        currentIdx++;
        displayQuestion();
      } else {
        showFinalResultsDisplay();
      }
    }

    function showFinalResultsDisplay() {
      document.getElementById('view-quiz').classList.add('hidden');
      document.getElementById('view-results').classList.remove('hidden');

      const pct = Math.round((correctAnswersCount / targetQuestionCount) * 100);
      document.getElementById('res-pct').innerText = `${pct}%`;
      document.getElementById('res-frac').innerText = `${correctAnswersCount}/${targetQuestionCount}`;

      let grade = 'Keep Reviewing!';
      if (pct >= 85) grade = 'Excellent Mastery!';
      else if (pct >= 65) grade = 'Good Progress!';
      document.getElementById('res-grade').innerText = grade;

      const breakdownBox = document.getElementById('res-breakdown');
      breakdownBox.innerHTML = '';

      selectedTopics.forEach(topicId => {
        const meta = quizTopics.find(t => t.id === topicId);
        const data = topicTrackingData[topicId];
        
        if (data && data.total > 0) {
          const ratio = Math.round((data.correct / data.total) * 100);
          
          const row = document.createElement('div');
          row.className = 'breakdown-row';
          row.innerHTML = `
            <div class="breakdown-header">
              <span>${meta ? meta.name : topicId}</span>
              <strong>${data.correct}/${data.total} (${ratio}%)</strong>
            </div>
            <div class="breakdown-track">
              <div class="breakdown-fill" style="width: ${ratio}%; background: ${meta ? meta.color : '#CCC'}"></div>
            </div>
          `;
          breakdownBox.appendChild(row);
        }
      });
    }

    function restartApp() {
      document.getElementById('view-results').classList.add('hidden');
      document.getElementById('view-setup').classList.remove('hidden');
      clearTopics();
    }

    window.onload = init;
  </script>
